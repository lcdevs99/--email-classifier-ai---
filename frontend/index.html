<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Email Classifier</title>
</head>
<body>
  <h1>Classificador de Emails</h1>
  <textarea id="emailText" rows="10" cols="50" placeholder="Cole o email aqui..."></textarea><br>
  <button onclick="processEmail()">Processar</button>
  <div id="resultado"></div>

  <script>
    async function processEmail() {
      const text = document.getElementById("emailText").value;
      const response = await fetch("http://127.0.0.1:5000/process", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text})
      });
      const result = await response.json();
      document.getElementById("resultado").innerText =
        `Categoria: ${result.categoria}\nResposta: ${result.resposta}`;
    }
  </script>
</body>
</html>

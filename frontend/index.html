<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Email Classifier</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Classificador de Emails</h1>

    <label for="emailText">Digite ou cole o email:</label>
    <textarea id="emailText" rows="8" placeholder="Cole o email aqui..."></textarea>
    <button onclick="processEmail()">Processar Texto</button>

    <hr>

    <label for="emailFile">Ou envie um arquivo (.txt ou .pdf):</label>
    <div class="file-wrapper">
      <input type="file" id="emailFile" accept=".txt,.pdf">
      <button id="clearBtn" class="clear-btn" onclick="clearFile()">×</button>
    </div>
    <button onclick="processFile()">Processar Arquivo</button>

    <div id="resultado"></div>
  </div>
  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
